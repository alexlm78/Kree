name: Release Executables with Compression

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: kree-linux-x64.tar.gz
            binary_path: target/x86_64-unknown-linux-gnu/release/kree
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: kree-win64.zip
            binary_path: target/x86_64-pc-windows-msvc/release/kree.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: kree-macos-arm64.tar.gz
            binary_path: target/aarch64-apple-darwin/release/kree
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: kree-macos-x64.tar.gz
            binary_path: target/x86_64-apple-darwin/release/kree

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Binary (Release mode)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          powershell Compress-Archive -Path ${{ matrix.binary_path }} -DestinationPath ${{ matrix.archive_name }}

      - name: Package Binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czf ${{ matrix.archive_name }} -C $(dirname ${{ matrix.binary_path }}) $(basename ${{ matrix.binary_path }})

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
