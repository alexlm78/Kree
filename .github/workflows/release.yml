name: Release Executables

on:
  push:
    tags:
      - 'v* '

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: kree-linux-x64.tar.gz
            binary_name: kree_cli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: kree-win64.zip
            binary_name: kree_cli.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_name: kree-macos-arm64.tar.gz
            binary_name: kree_cli
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: kree-macos-x64.tar.gz
            binary_name: kree_cli

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Binary
        run: cargo build --release --package kree_cli --target ${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          powershell Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.binary_name }} -DestinationPath ${{ matrix.archive_name }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czf ${{ matrix.archive_name }} -C target/${{ matrix.target }}/release ${{ matrix.binary_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
